<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Mrinalini Patnaik</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Floating Objects -->
  <div class="floating floating1">
    <img src="assets/floating1.svg" alt="Floating Shape 1">
  </div>
  <div class="floating floating2">
    <img src="assets/floating2.svg" alt="Floating Shape 2">
  </div>
  <div class="floating floating3">
    <img src="assets/floating3.svg" alt="Floating Shape 3">
  </div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">Mrinalini Patnaik</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="education.html">Education</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- Content Section -->
  <section class="content">
    <h2>Contact Me</h2>
    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>
      </div>
      <button type="submit">Send Message</button>
      <p id="form-status"></p>
    </form>
  </section>

  <!-- Background Animation Canvas -->
  <canvas id="background-canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
